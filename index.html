<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDOKU FLOW</title>
    <style>
        :root {
            /* Default: Light Theme */
            --bg-color: #fcfcfc;
            --line-color: #333;
            --text-original: #000;
            --text-solved: #0056b3;
            --text-memo: #aaa;
            --text-warning: #e65100;
            --text-error: #d32f2f;
            --highlight-bg: rgba(0, 86, 179, 0.1);
            --crosshair-bg: rgba(0, 86, 179, 0.08);
            --focus-bg: rgba(0, 86, 179, 0.2);
            --flash-color: rgba(0, 86, 179, 0.3);
            
            --cell-size: min(7.5vw, 6.2vh);
            --border-thick: 3px;
            --border-thin: 1px;
            --transition-speed: 0.6s;
        }

        /* Dark Theme */
        body.theme-dark {
            --bg-color: #000;
            --line-color: #fff;
            --text-original: #fff;
            --text-solved: #00e5ff;
            --text-memo: #888;
            --text-warning: #ff3d00;
            --text-error: #ff1744;
            --highlight-bg: rgba(0, 229, 255, 0.2);
            --crosshair-bg: rgba(0, 229, 255, 0.18);
            --focus-bg: rgba(0, 229, 255, 0.35);
            --flash-color: rgba(255, 255, 255, 0.8);
        }

        /* Sepia Theme */
        body.theme-sepia {
            --bg-color: #f4ecd8;
            --line-color: #5d4037;
            --text-original: #3e2723;
            --text-solved: #006064;
            --text-memo: #a1887f;
            --text-warning: #bf360c;
            --text-error: #d32f2f;
            --highlight-bg: rgba(93, 64, 55, 0.1);
            --crosshair-bg: rgba(93, 64, 55, 0.08);
            --focus-bg: rgba(93, 64, 55, 0.15);
            --flash-color: rgba(93, 65, 55, 0.3);
        }

        /* Neon Theme */
        body.theme-neon {
            --bg-color: #1a0033;
            --line-color: #ff00ff;
            --text-original: #fff;
            --text-solved: #00ffff;
            --text-memo: #660066;
            --text-warning: #ffcc00;
            --text-error: #ff0055;
            --highlight-bg: rgba(255, 0, 255, 0.15);
            --crosshair-bg: rgba(0, 255, 255, 0.1);
            --focus-bg: rgba(0, 255, 255, 0.25);
            --flash-color: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-original);
            font-family: 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color var(--transition-speed) ease;
        }

        #main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            justify-content: center;
        }

        #ui-layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }

        #app-header h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 200;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-original);
            opacity: 0.9;
            text-indent: 0.35em; 
        }

        #difficulty-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .diff-btn {
            background: transparent;
            border: 1px solid rgba(128, 128, 128, 0.3);
            color: #777;
            padding: 6px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-radius: 2px;
        }
        
        body.theme-dark .diff-btn, body.theme-neon .diff-btn, body.theme-sepia .diff-btn {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .diff-btn:hover, .diff-btn.active {
            border-color: var(--text-solved);
            color: var(--text-solved);
        }

        .diff-btn.active {
            background: var(--highlight-bg);
            font-weight: bold;
        }

        #board-layout {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #theme-selector {
            position: absolute;
            left: calc(100% + 24px);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .theme-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #888;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover { transform: scale(1.15); }
        .theme-btn.active { 
            border-color: var(--text-solved);
            box-shadow: 0 0 12px var(--text-solved);
        }
        .theme-light-btn { background: #fff; border-color: #ddd; }
        .theme-dark-btn { background: #000; }
        .theme-sepia-btn { background: #f4ecd8; border-color: #5d4037; }
        .theme-neon-btn { background: linear-gradient(45deg, #1a0033, #ff00ff); }

        #status-panel {
            margin-bottom: 12px;
            font-size: 1.05rem;
            letter-spacing: 1.5px;
            height: 1.5rem;
            color: var(--text-solved);
            font-weight: 300;
            text-align: center;
        }

        .sudoku-container {
            position: relative;
            padding: var(--border-thick);
            background-color: var(--line-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            line-height: 0;
            transition: opacity var(--transition-speed) ease;
        }

        .sudoku-container.fade-out { opacity: 0; }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            background-color: var(--bg-color);
            gap: 0;
            transition: background-color var(--transition-speed) ease;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: var(--border-thin) solid rgba(128, 128, 128, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: calc(var(--cell-size) * 0.62);
            transition: background-color 0.15s, color 0.15s;
            padding: 2px;
            overflow: visible;
            background-color: transparent;
        }

        /* Borders */
        .cell:nth-child(3n) { border-right: var(--border-thick) solid var(--line-color); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: var(--border-thick) solid var(--line-color); }
        .cell:nth-child(n+73):nth-child(-n+81) { border-bottom: none; }

        .cell.original { color: var(--text-original); font-weight: bold; }
        .cell.solved { color: var(--text-solved); font-weight: bold; }
        .cell.guessed { color: var(--text-warning); font-style: italic; font-weight: bold; }

        /* UI Interaction States */
        .cell.crosshair { background-color: var(--crosshair-bg) !important; }
        .cell.active-focus { background-color: var(--focus-bg) !important; z-index: 5; box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.2); }
        
        /* Error State (Must be last to override UI backgrounds) */
        .cell.error { 
            color: var(--text-error); 
            background-color: rgba(255, 23, 68, 0.4) !important; 
            animation: shake 0.3s infinite; 
            z-index: 10;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .memo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            margin: auto;
            font-size: calc(var(--cell-size) * 0.2);
            color: var(--text-memo);
            line-height: 1;
            text-align: center;
            pointer-events: none;
            align-items: center;
            justify-items: center;
        }

        .unit-flash { 
            animation: unit-complete-flash 0.8s cubic-bezier(0.2, 0, 0.2, 1) forwards !important; 
            z-index: 15 !important;
        }

        @keyframes unit-complete-flash {
            0% { 
                background-color: var(--flash-color) !important; 
                box-shadow: inset 0 0 40px var(--flash-color);
            }
            100% { 
                background-color: transparent !important; 
            }
        }

        #speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(128, 128, 128, 0.06);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(128, 128, 128, 0.1);
            margin-top: 24px;
        }

        #speed-control label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #tick-slider {
            width: 130px;
            cursor: pointer;
            accent-color: var(--text-solved);
        }

        #tick-value {
            font-size: 0.75rem;
            color: var(--text-solved);
            min-width: 55px;
            font-family: monospace;
            text-align: right;
            opacity: 0.8;
        }

        .completed-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body class="theme-light">

    <div id="main-wrapper">
        <div id="ui-layer">
            <div id="app-header">
                <h1>SUDOKU FLOW</h1>
            </div>
            <div id="difficulty-selector">
                <button class="diff-btn active" data-level="CALM">Calm</button>
                <button class="diff-btn" data-level="CHAOS">Chaos</button>
            </div>
        </div>

        <div id="status-panel">Ready</div>

        <div id="board-layout">
            <div class="sudoku-container" id="board-container">
                <div class="sudoku-board" id="board"></div>
                <div class="completed-overlay" id="overlay"></div>
            </div>

            <div id="theme-selector">
                <div class="theme-btn theme-light-btn active" data-theme="light" title="Light"></div>
                <div class="theme-btn theme-dark-btn" data-theme="dark" title="Dark"></div>
                <div class="theme-btn theme-sepia-btn" data-theme="sepia" title="Sepia"></div>
                <div class="theme-btn theme-neon-btn" data-theme="neon" title="Neon"></div>
            </div>
        </div>

        <div id="speed-control">
            <label for="tick-slider">Speed</label>
            <input type="range" id="tick-slider" min="50" max="4000" step="50" value="1200">
            <span id="tick-value">1200ms</span>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const boardContainer = document.getElementById('board-container');
        const statusElement = document.getElementById('status-panel');
        const overlay = document.getElementById('overlay');
        const diffButtons = document.querySelectorAll('.diff-btn');
        const themeButtons = document.querySelectorAll('.theme-btn');
        const tickSlider = document.getElementById('tick-slider');
        const tickValueDisplay = document.getElementById('tick-value');
        const DEBUG = false;
        const STATUS_MESSAGES = {
            generatingBoard: (difficultyLabel) => `🧩 Generating Board [${difficultyLabel}]`,
            fillingCandidates: "🔍 Action: CANDIDATE_SCAN",
            guessing: (val) => `🤔 Action: GUESS -> try ${val}`,
            confirming: (val) => `✅ Action: CONFIRM -> place ${val}`,
            contradictionRetrying: "⚠️ Action: CONTRADICTION -> retry",
            solvingFailedRegenerating: "🔄 Action: REGENERATE_BOARD",
            backtracking: "↩️ Action: BACKTRACK -> restore previous guess",
            completedCountdown: (seconds) => `🎉 Completed! Next board in ${seconds}...`
        };
        
        let grid = [];
        let cells = [];
        let history = []; 
        let tickRate = 1200;
        const BASE_MOVE_SPEED = 60;
        const MIN_MOVE_SPEED = 5;
        const MAX_MOVE_SPEED = 350;

        class Cell {
            constructor(r, c, val = 0) {
                this.r = r;
                this.c = c;
                this.val = val;
                this.original = val !== 0;
                this.memos = new Set();
                this.dom = null;
                this.isGuessed = false;
            }
            clone() {
                const newCell = new Cell(this.r, this.c, this.val);
                newCell.original = this.original;
                newCell.isGuessed = this.isGuessed;
                newCell.memos = new Set(this.memos);
                return newCell;
            }
        }

        function isValid(g, r, c, v) {
            for (let i = 0; i < 9; i++) if (g[r][i] === v || g[i][c] === v) return false;
            const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (g[br+i][bc+j] === v) return false;
            return true;
        }

        function generateFullGrid(g) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (g[r][c] === 0) {
                        const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                        for (let n of nums) {
                            if (isValid(g, r, c, n)) {
                                g[r][c] = n;
                                if (generateFullGrid(g)) return true;
                                g[r][c] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        const App = {
            difficulty: 'CALM',
            currentCycleId: 0,
            focusR: 0,
            focusC: 0,
            cycleBacktrackCount: 0,
            cycleGuessCount: 0,
            currentCycleSummary: null,

            async init() {
                this.setupDifficultyListeners();
                this.setupThemeListeners();
                this.setupTickListener();
                this.createDOM();
                this.startCycle();
            },

            setupDifficultyListeners() {
                diffButtons.forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const level = btn.getAttribute('data-level');
                        if (this.difficulty === level) return;
                        this.difficulty = level;
                        diffButtons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        await this.restart();
                    });
                });
            },

            setupThemeListeners() {
                themeButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const theme = btn.getAttribute('data-theme');
                        document.body.className = `theme-${theme}`;
                        themeButtons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
            },

            setupTickListener() {
                tickSlider.addEventListener('input', (e) => {
                    tickRate = parseInt(e.target.value);
                    tickValueDisplay.innerText = `${tickRate}ms`;
                });
            },

            async restart() {
                this.currentCycleId++;
                history = [];
                this.focusR = 0;
                this.focusC = 0;
                
                boardContainer.classList.add('fade-out');
                await this.sleep(600, this.currentCycleId);
                
                this.createDOM();
                this.startCycle();
                
                boardContainer.classList.remove('fade-out');
            },

            createDOM() {
                boardElement.innerHTML = '';
                cells = [];
                for (let i = 0; i < 81; i++) {
                    const d = document.createElement('div');
                    d.className = 'cell';
                    boardElement.appendChild(d);
                    cells.push(d);
                }
            },

            setFocus(row, col) {
                this.focusR = row;
                this.focusC = col;
                grid.forEach((rList, r) => {
                    rList.forEach((cell, c) => {
                        const dom = cell.dom;
                        if (!dom) return;
                        dom.classList.remove('crosshair', 'active-focus');
                        if (r === row && c === col) {
                            dom.classList.add('active-focus');
                        } else if (r === row || c === col) {
                            dom.classList.add('crosshair');
                        }
                    });
                });
            },

            async moveTo(targetR, targetC, cycleId) {
                let currentMoveSpeed = (tickRate / 1000) * BASE_MOVE_SPEED;
                currentMoveSpeed = Math.max(MIN_MOVE_SPEED, Math.min(MAX_MOVE_SPEED, currentMoveSpeed));

                const rowDiff = Math.abs(targetR - this.focusR);
                const colDiff = Math.abs(targetC - this.focusC);
                const moveRowFirst = rowDiff < colDiff ? true : colDiff < rowDiff ? false : Math.random() < 0.5;

                const stepRow = async () => {
                    while (this.focusR !== targetR) {
                        if (cycleId !== this.currentCycleId) return false;
                        const nextR = this.focusR < targetR ? this.focusR + 1 : this.focusR - 1;
                        this.setFocus(nextR, this.focusC);
                        if (!await this.sleep(currentMoveSpeed, cycleId)) return false;
                    }
                    return true;
                };

                const stepCol = async () => {
                    while (this.focusC !== targetC) {
                        if (cycleId !== this.currentCycleId) return false;
                        const nextC = this.focusC < targetC ? this.focusC + 1 : this.focusC - 1;
                        this.setFocus(this.focusR, nextC);
                        if (!await this.sleep(currentMoveSpeed, cycleId)) return false;
                    }
                    return true;
                };

                if (moveRowFirst) {
                    if (!await stepRow()) return false;
                    if (!await stepCol()) return false;
                } else {
                    if (!await stepCol()) return false;
                    if (!await stepRow()) return false;
                }
                return true;
            },

            async startCycle() {
                const cycleId = this.currentCycleId;
                let cycleNumber = 0;
                while(cycleId === this.currentCycleId) {
                    cycleNumber++;
                    const cycleStartedAt = performance.now();
                    this.debugLog('cycle_start', {
                        cycleId,
                        cycleNumber,
                        difficulty: this.difficulty,
                        tickRate
                    });

                    history = [];
                    this.cycleBacktrackCount = 0;
                    this.cycleGuessCount = 0;
                    this.currentCycleSummary = null;
                    this.focusR = 0;
                    this.focusC = 0;

                    let phaseStartedAt = performance.now();
                    const generated = await this.generatePuzzle(cycleId);
                    this.debugLog('phase_duration', {
                        cycleId,
                        cycleNumber,
                        phase: 'generatePuzzle',
                        durationMs: Math.round(performance.now() - phaseStartedAt),
                        success: generated
                    });
                    if (!generated) {
                        this.debugLog('cycle_end', {
                            cycleId,
                            cycleNumber,
                            reason: 'generatePuzzle_interrupted',
                            durationMs: Math.round(performance.now() - cycleStartedAt)
                        });
                        break;
                    }

                    phaseStartedAt = performance.now();
                    const memoFilled = await this.phaseMemoFill(cycleId);
                    this.debugLog('phase_duration', {
                        cycleId,
                        cycleNumber,
                        phase: 'phaseMemoFill',
                        durationMs: Math.round(performance.now() - phaseStartedAt),
                        success: memoFilled
                    });
                    if (!memoFilled) {
                        this.debugLog('cycle_end', {
                            cycleId,
                            cycleNumber,
                            reason: 'phaseMemoFill_interrupted',
                            durationMs: Math.round(performance.now() - cycleStartedAt)
                        });
                        break;
                    }

                    phaseStartedAt = performance.now();
                    const solved = await this.phaseSolve(cycleId);
                    const solveDurationMs = Math.round(performance.now() - phaseStartedAt);
                    this.debugLog('phase_duration', {
                        cycleId,
                        cycleNumber,
                        phase: 'phaseSolve',
                        durationMs: solveDurationMs,
                        success: solved
                    });
                    if (!solved) {
                        this.debugLog('cycle_end', {
                            cycleId,
                            cycleNumber,
                            reason: 'phaseSolve_interrupted',
                            durationMs: Math.round(performance.now() - cycleStartedAt)
                        });
                        break;
                    }

                    this.currentCycleSummary = {
                        solveDurationMs,
                        backtrackCount: this.cycleBacktrackCount,
                        guessCount: this.cycleGuessCount
                    };

                    phaseStartedAt = performance.now();
                    await this.phaseComplete(cycleId);
                    this.debugLog('phase_duration', {
                        cycleId,
                        cycleNumber,
                        phase: 'phaseComplete',
                        durationMs: Math.round(performance.now() - phaseStartedAt),
                        success: cycleId === this.currentCycleId
                    });
                    
                    if (cycleId === this.currentCycleId) {
                        boardContainer.classList.add('fade-out');
                        await this.sleep(1000, cycleId);
                        this.createDOM();
                        boardContainer.classList.remove('fade-out');
                        await this.sleep(600, cycleId);
                    }

                    this.debugLog('cycle_end', {
                        cycleId,
                        cycleNumber,
                        reason: cycleId === this.currentCycleId ? 'completed' : 'cycle_changed',
                        durationMs: Math.round(performance.now() - cycleStartedAt)
                    });
                }
            },

            async sleep(ms, cycleId) {
                return new Promise(resolve => {
                    setTimeout(() => resolve(cycleId === this.currentCycleId), ms);
                });
            },

            setStatus(message, colorVar) {
                statusElement.innerText = message;
                if (colorVar) statusElement.style.color = `var(${colorVar})`;
            },

            debugLog(event, payload = {}) {
                if (!DEBUG) return;
                console.log(`[sudoku-flow] ${event}`, payload);
            },

            async generatePuzzle(cycleId) {
                const diffLabels = { CALM: "CALM", CHAOS: "CHAOS" };
                this.setStatus(STATUS_MESSAGES.generatingBoard(diffLabels[this.difficulty]), "--text-solved");
                overlay.style.display = 'none';
                
                let rawGrid = Array.from({length: 9}, () => Array(9).fill(0));
                generateFullGrid(rawGrid);

                const removeRanges = { CALM: [34, 38], CHAOS: [68, 72] };
                const [minRemove, maxRemove] = removeRanges[this.difficulty];
                const removeCount = minRemove + Math.floor(Math.random() * (maxRemove - minRemove + 1));

                const positions = [];
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) positions.push([r, c]);
                }
                for (let i = positions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [positions[i], positions[j]] = [positions[j], positions[i]];
                }

                const removed = new Set(positions.slice(0, removeCount).map(([r, c]) => `${r}-${c}`));
                if (this.difficulty === 'CALM') {
                    const minRowGivens = 3;
                    const minBlockGivens = 3;
                    let restoredCells = 0;

                    for (let r = 0; r < 9; r++) {
                        let givenCount = 0;
                        const rowRemoved = [];
                        for (let c = 0; c < 9; c++) {
                            const key = `${r}-${c}`;
                            if (removed.has(key)) rowRemoved.push(key);
                            else givenCount++;
                        }
                        while (givenCount < minRowGivens && rowRemoved.length > 0) {
                            const idx = Math.floor(Math.random() * rowRemoved.length);
                            removed.delete(rowRemoved[idx]);
                            rowRemoved.splice(idx, 1);
                            givenCount++;
                            restoredCells++;
                        }
                    }

                    for (let br = 0; br < 3; br++) {
                        for (let bc = 0; bc < 3; bc++) {
                            let givenCount = 0;
                            const blockRemoved = [];
                            for (let dr = 0; dr < 3; dr++) {
                                for (let dc = 0; dc < 3; dc++) {
                                    const r = br * 3 + dr;
                                    const c = bc * 3 + dc;
                                    const key = `${r}-${c}`;
                                    if (removed.has(key)) blockRemoved.push(key);
                                    else givenCount++;
                                }
                            }
                            while (givenCount < minBlockGivens && blockRemoved.length > 0) {
                                const idx = Math.floor(Math.random() * blockRemoved.length);
                                removed.delete(blockRemoved[idx]);
                                blockRemoved.splice(idx, 1);
                                givenCount++;
                                restoredCells++;
                            }
                        }
                    }

                    this.debugLog('calm_guard', { restoredCells });
                }
                grid = rawGrid.map((row, r) => row.map((val, c) => {
                    const isRemoved = removed.has(`${r}-${c}`);
                    return new Cell(r, c, isRemoved ? 0 : val);
                }));

                this.updateDisplay();
                this.setFocus(this.focusR, this.focusC);
                return await this.sleep(1000, cycleId);
            },

            updateDisplay() {
                grid.forEach((row, r) => {
                    row.forEach((cell, c) => {
                        const dom = cells[r * 9 + c];
                        cell.dom = dom;
                        this.renderCellContent(cell);
                    });
                });
            },

            renderCellContent(cell) {
                const dom = cell.dom;
                if (!dom) return;

                const classesToKeep = ['crosshair', 'active-focus', 'unit-flash', 'error'];
                const currentPreservedClasses = Array.from(dom.classList).filter(c => classesToKeep.includes(c));
                dom.className = 'cell ' + currentPreservedClasses.join(' ');

                if (cell.val !== 0) {
                    const newText = cell.val.toString();
                    if (dom.innerHTML.includes('memo-grid') || dom.innerText !== newText) {
                        dom.innerText = newText;
                        if (!cell.original) {
                            dom.classList.add('pop-anim');
                            setTimeout(() => dom.classList.remove('pop-anim'), 400);
                        }
                    }
                    if (cell.original) dom.classList.add('original');
                    else dom.classList.add('solved');
                    if (cell.isGuessed) dom.classList.add('guessed');
                } else {
                    this.renderMemos(cell);
                }
            },

            async phaseMemoFill(cycleId) {
                this.setStatus(STATUS_MESSAGES.fillingCandidates);
                for (let r = 0; r < 9; r++) {
                    const isReverse = (r % 2 !== 0);
                    for (let i = 0; i < 9; i++) {
                        if (cycleId !== this.currentCycleId) return false;
                        const c = isReverse ? (8 - i) : i;
                        const cell = grid[r][c];
                        if (cell.val === 0) {
                            if (!await this.moveTo(r, c, cycleId)) return false;
                            cell.dom.classList.add('highlight-action');
                            for (let n = 1; n <= 9; n++) {
                                if (this.canPlace(r, c, n)) cell.memos.add(n);
                            }
                            this.renderMemos(cell);
                            const memoDelay = Math.max(2, Math.min(20, tickRate / 50));
                            if (!await this.sleep(memoDelay, cycleId)) return false;
                            cell.dom.classList.remove('highlight-action');
                        }
                    }
                }
                return true;
            },

            renderMemos(cell) {
                if (cell.val !== 0) return;
                let html = '<div class="memo-grid">';
                for (let i = 1; i <= 9; i++) {
                    html += `<div>${cell.memos.has(i) ? i : ''}</div>`;
                }
                html += '</div>';
                if (cell.dom.innerHTML !== html) {
                    cell.dom.innerHTML = html;
                }
            },

            canPlace(r, c, v) {
                for (let i = 0; i < 9; i++) if (grid[r][i].val === v || grid[i][c].val === v) return false;
                const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (grid[br+i][bc+j].val === v) return false;
                return true;
            },

            async phaseSolve(cycleId) {
                while (!this.isAllFilled()) {
                    if (cycleId !== this.currentCycleId) return false;
                    const action = this.findNextAction();
                    this.debugLog('action_selected', {
                        cycleId,
                        action: action.type,
                        row: action.cell ? action.cell.r : null,
                        col: action.cell ? action.cell.c : null,
                        val: action.val ?? null,
                        memoCount: action.cell ? action.cell.memos.size : null
                    });
                    if (action.cell) {
                        if (!await this.moveTo(action.cell.r, action.cell.c, cycleId)) return false;
                    }
                    if (action.type === 'CONTRADICTION') {
                        if (action.reason === 'EMPTY_MEMO') {
                            this.setStatus("Action: CONTRADICTION (EMPTY_MEMO) -> retry", "--text-error");
                        }
                        if (!await this.backtrack(action.cell, cycleId)) return true;
                    } else if (action.type === 'GUESS') {
                        this.cycleGuessCount++;
                        if (action.reason === 'MIN_CANDIDATE_GUESS') {
                            this.setStatus(`Action: GUESS (MIN_CANDIDATE_GUESS) -> try ${action.val}`, "--text-warning");
                        } else {
                            this.setStatus(STATUS_MESSAGES.guessing(action.val), "--text-warning");
                        }
                        this.saveHistory(action.cell, action.val);
                        await this.confirmCell(action.cell, action.val, true);
                    } else if (action.type === 'CONFIRM') {
                        if (action.reason === 'SINGLE_CANDIDATE') {
                            this.setStatus(`Action: CONFIRM (SINGLE_CANDIDATE) -> place ${action.val}`, "--text-solved");
                        } else {
                            this.setStatus(STATUS_MESSAGES.confirming(action.val), "--text-solved");
                        }
                        await this.confirmCell(action.cell, action.val, false);
                    }
                    if (!await this.sleep(tickRate, cycleId)) return false;
                }
                this.clearFocus();
                return true;
            },

            findNextAction() {
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const cell = grid[r][c];
                        if (cell.val === 0 && cell.memos.size === 0) return { type: 'CONTRADICTION', cell, reason: 'EMPTY_MEMO' };
                    }
                }
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const cell = grid[r][c];
                        if (cell.val === 0 && cell.memos.size === 1) return { type: 'CONFIRM', cell, val: [...cell.memos][0], reason: 'SINGLE_CANDIDATE' };
                    }
                }
                let best = null;
                for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                    const cell = grid[r][c];
                    if (cell.val === 0 && cell.memos.size > 0) {
                        if (!best || cell.memos.size < best.memos.size) best = cell;
                    }
                }
                if (best) {
                    const candidates = [...best.memos];
                    const randomVal = candidates[Math.floor(Math.random() * candidates.length)];
                    return { type: 'GUESS', cell: best, val: randomVal, reason: 'MIN_CANDIDATE_GUESS' };
                }
                return { type: 'CONTRADICTION', cell: null };
            },

            saveHistory(cell, val) {
                const snapshot = grid.map(row => row.map(c => c.clone()));
                history.push({ 
                    gridState: snapshot, 
                    cellCoord: { r: cell.r, c: cell.c }, 
                    failedVal: val 
                });
            },

            async backtrack(errorCell, cycleId) {
                this.cycleBacktrackCount++;
                this.debugLog('backtrack', {
                    cycleId,
                    stage: 'detected',
                    hasErrorCell: Boolean(errorCell),
                    historyDepth: history.length
                });
                if (this.difficulty === 'CHAOS' && this.cycleBacktrackCount > 20) {
                    this.debugLog('backtrack', {
                        cycleId,
                        stage: 'chaos_safety_regenerate',
                        historyDepth: history.length,
                        backtrackCount: this.cycleBacktrackCount
                    });
                    this.setStatus(STATUS_MESSAGES.solvingFailedRegenerating);
                    await this.sleep(1500, cycleId);
                    await this.restart();
                    return false;
                }
                if (errorCell) errorCell.dom.classList.add('error');
                this.setStatus(STATUS_MESSAGES.contradictionRetrying, "--text-error");
                if (!await this.sleep(Math.max(500, tickRate), cycleId)) return false;
                if (errorCell) errorCell.dom.classList.remove('error');
                if (history.length === 0) {
                    this.debugLog('backtrack', {
                        cycleId,
                        stage: 'restart',
                        historyDepth: 0
                    });
                    this.setStatus(STATUS_MESSAGES.solvingFailedRegenerating);
                    await this.sleep(1500, cycleId);
                    await this.restart();
                    return false;
                }
                this.setStatus(STATUS_MESSAGES.backtracking, "--text-warning");
                const lastState = history.pop();
                this.debugLog('backtrack', {
                    cycleId,
                    stage: 'restore',
                    historyDepth: history.length,
                    targetRow: lastState.cellCoord.r,
                    targetCol: lastState.cellCoord.c,
                    removedCandidate: lastState.failedVal
                });
                grid = lastState.gridState.map(row => row.map(c => c.clone()));
                const targetCell = grid[lastState.cellCoord.r][lastState.cellCoord.c];
                targetCell.memos.delete(lastState.failedVal);
                this.updateDisplay();
                if (!await this.moveTo(targetCell.r, targetCell.c, cycleId)) return false;
                this.flashUnit([targetCell.dom]); 
                await this.sleep(600, cycleId);
                return true;
            },

            async confirmCell(cell, val, isGuess) {
                cell.val = val;
                cell.isGuessed = isGuess;
                cell.memos.clear();
                this.renderCellContent(cell);
                this.checkUnitCompletions(cell.r, cell.c);
                this.updateRelatedMemos(cell.r, cell.c, val);
            },

            checkUnitCompletions(r, c) {
                const row = grid[r];
                if (row.every(cell => cell.val !== 0)) this.flashUnit(row.map(cell => cell.dom));
                const col = [];
                for (let i = 0; i < 9; i++) col.push(grid[i][c]);
                if (col.every(cell => cell.val !== 0)) this.flashUnit(col.map(cell => cell.dom));
                const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                const region = [];
                for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) region.push(grid[br+i][bc+j]);
                if (region.every(cell => cell.val !== 0)) this.flashUnit(region.map(cell => cell.dom));
            },

            flashUnit(doms) {
                doms.forEach(dom => {
                    if (!dom) return;
                    dom.classList.remove('unit-flash');
                    void dom.offsetWidth; 
                    dom.classList.add('unit-flash');
                    setTimeout(() => dom.classList.remove('unit-flash'), 1000);
                });
            },

            updateRelatedMemos(r, c, val) {
                for (let i = 0; i < 9; i++) {
                    this.removeMemo(grid[r][i], val);
                    this.removeMemo(grid[i][c], val);
                }
                const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) this.removeMemo(grid[br+i][bc+j], val);
            },

            removeMemo(cell, val) {
                if (cell.val === 0 && cell.memos.has(val)) {
                    cell.memos.delete(val);
                    this.renderMemos(cell);
                }
            },

            isAllFilled() {
                return grid.every(row => row.every(cell => cell.val !== 0));
            },

            clearFocus() {
                grid.forEach(rList => rList.forEach(cell => {
                    if (cell.dom) cell.dom.classList.remove('crosshair', 'active-focus');
                }));
            },

            async phaseComplete(cycleId) {
                if (!this.isAllFilled()) return; 
                this.clearFocus();
                overlay.style.display = 'block';
                for (let i = 5; i > 0; i--) {
                    if (cycleId !== this.currentCycleId) return;
                    const summary = this.currentCycleSummary;
                    const summaryText = summary ? ` | Solve ${(summary.solveDurationMs / 1000).toFixed(1)}s | Backtracks ${summary.backtrackCount} | Guesses ${summary.guessCount}` : '';
                    this.setStatus(`${STATUS_MESSAGES.completedCountdown(i)}${summaryText}`, "--text-solved");
                    if (!await this.sleep(1000, cycleId)) return;
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
